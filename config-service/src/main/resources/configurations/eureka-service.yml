server:
  port: 8761

spring:
  application:
    name: eureka-service

eureka:
  instance:
    hostname: ${spring.application.name}
    #hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${spring.application.name}:${server.port}/eureka