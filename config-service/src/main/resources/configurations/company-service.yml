server:
  port: 8090

spring:
  datasource:
    url: ${DB_URL_COMPANY_SERVICE}
    username: ${DB_USERNAME_COMPANY_SERVICE}
    password: ${DB_PASSWORD_COMPANY_SERVICE}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

clients:
  rewards:
    base-url: ${REWARDS_SERVICE_URL:http://rewards-service}

eureka:
  instance:
    hostname: localhost
    #hostname: company-service
  client:
    service-url:
      default-zone: ${EUREKA_URL:http://localhost:8761/eureka}
      #defaultZone: ${EUREKA_URL}
